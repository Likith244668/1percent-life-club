<!--
  The only global CSS in the project. Everything else is inline `style={{...}}`
  per component (no imported stylesheet files). These rules can't be expressed
  as element-level inline styles: the keyframes animation, the :root accent
  token, smooth scrolling, and body-level font smoothing.
-->
<style>
  :root { --lc-accent: #FF6B00; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; background: #F1EBE3; }
  body { margin: 0; background: #F1EBE3; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  @keyframes lcFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
