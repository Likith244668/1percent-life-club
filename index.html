<!--
  The only global CSS in the project. Everything else is inline `style={{...}}`
  per component (no imported stylesheet files). These rules can't be expressed
  as element-level inline styles: the keyframes animation, the :root accent
  token, smooth scrolling, and body-level font smoothing.
-->
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; background: #FFFFFF; }
  body { margin: 0; background: #FFFFFF; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: #FF6B00; color: #fff; }
</style>
</head>

</body>
